# =============================================
# POS - Factura Electrónica Argentina
# =============================================

server.port=8080
spring.application.name=pos-factura-electronica

# ---- MySQL / Spring Data JPA ----
# =========================================
# MYSQL
# =========================================

# -------------------------------------------------------
# DataSource 1: posFE  (tablas propias del proyecto)
# -------------------------------------------------------
datasource.posfe.url=jdbc:mysql://localhost:3306/posFE?useSSL=false&characterEncoding=UTF-8&useUnicode=true
datasource.posfe.username=root
datasource.posfe.password=root
datasource.posfe.driver-class-name=com.mysql.jdbc.Driver
datasource.posfe.hikari.maximum-pool-size=10
datasource.posfe.hikari.minimum-idle=2
datasource.posfe.hikari.connection-timeout=30000
datasource.posfe.hikari.pool-name=HikariPool-posFE

# -------------------------------------------------------
# DataSource 2: DBTPVIV  (tablas de la caja)
# -------------------------------------------------------
datasource.dbtpviv.url=jdbc:mysql://localhost:3306/DBTPVIV?useSSL=false&serverTimezone=UTC&autoReconnect=true
datasource.dbtpviv.username=root
datasource.dbtpviv.password=root
# Pool de conexiones (HikariCP — incluido por defecto en Spring Boot)
datasource.dbtpviv.driver-class-name=com.mysql.jdbc.Driver
datasource.dbtpviv.hikari.maximum-pool-size=5
datasource.dbtpviv.hikari.minimum-idle=1
datasource.dbtpviv.hikari.connection-timeout=30000
datasource.dbtpviv.hikari.pool-name=HikariPool-DBTPVIV

# -------------------------------------------------------
# JPA / Hibernate  (aplica a ambos DataSource)
# -------------------------------------------------------
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway se configura manualmente en PosFeFlywayConfig.java
# para que solo corra sobre posFE
spring.flyway.enabled=false


# ---- Credenciales API Externa ----
factura.api.url=https://www.tusfacturas.app/app/api
factura.api.usertoken=TU_USERTOKEN
factura.api.apikey=TU_APIKEY
factura.api.apitoken=TU_APITOKEN

# ---- Datos del Emisor ----
factura.emisor.cuit=20123456789
factura.emisor.punto-venta=1
factura.emisor.razon-social=Mi Empresa S.R.L.

# ---- Timeouts HTTP ----
factura.api.connect-timeout-ms=5000
factura.api.read-timeout-ms=15000

# ---- Logging ----
logging.level.com.pos.factura=DEBUG
logging.level.org.springframework.web.client=DEBUG
logging.level.org.hibernate.SQL=DEBUG

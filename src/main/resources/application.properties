# =============================================
# POS - Factura Electrónica Argentina
# =============================================

server.port=8080
spring.application.name=pos-factura-electronica

# ---- MySQL / Spring Data JPA ----
spring.datasource.url=jdbc:mysql://localhost:3306/pos_db?useSSL=false&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=pos_user
spring.datasource.password=pos_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP — incluido por defecto en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — migraciones automáticas de esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Credenciales API Externa ----
factura.api.url=https://www.tusfacturas.app/app/api
factura.api.usertoken=TU_USERTOKEN
factura.api.apikey=TU_APIKEY
factura.api.apitoken=TU_APITOKEN

# ---- Datos del Emisor ----
factura.emisor.cuit=20123456789
factura.emisor.punto-venta=1
factura.emisor.razon-social=Mi Empresa S.R.L.

# ---- Timeouts HTTP ----
factura.api.connect-timeout-ms=5000
factura.api.read-timeout-ms=15000

# ---- Logging ----
logging.level.com.pos.factura=DEBUG
logging.level.org.springframework.web.client=DEBUG
logging.level.org.hibernate.SQL=DEBUG
